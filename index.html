<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>狂熱雞尾酒與加密貨幣</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    /* Reset and Global Styles */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: #1a1a2e;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      margin: 0;
    }

    .container {
      max-width: 1200px;
      width: 90%;
      margin: 20px auto;
    }

    h1, h2 {
      text-align: center;
      font-size: 2.5rem;
      background: linear-gradient(90deg, #ff758c, #ffdf89);
      -webkit-background-clip: text;
      color: transparent;
      margin-bottom: 20px;
    }

    h2 {
      font-size: 2rem;
    }

    button {
      background: #ff758c;
      border: none;
      padding: 10px 20px;
      color: #fff;
      border-radius: 30px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    button:hover {
      background: #ffdf89;
      color: #1a1a2e;
    }

    input {
      padding: 10px;
      border: 2px solid #ff758c;
      border-radius: 30px;
      margin: 10px 0;
      color: #fff;
      background: transparent;
      outline: none;
      width: 100%;
    }

    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
      margin: 20px 0;
    }

    .card {
      background: #2a2a40;
      border-radius: 15px;
      padding: 20px;
      text-align: center;
      flex: 1 1 calc(20% - 15px);
      max-width: calc(20% - 15px);
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.5);
      color: #fff;
      transition: transform 0.3s ease;
    }

    .card:hover {
      transform: translateY(-10px);
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.8);
    }

    .card img {
      width: 100%;
      height: 100px;
      object-fit: cover;
      border-radius: 10px;
      margin-bottom: 10px;
    }

    .rwd-toggle {
      display: none;
    }

    /* Responsive Design */
    @media (max-width: 768px) {
      h1, h2 {
        font-size: 2rem;
      }

      .row {
        flex-direction: column;
        align-items: center;
      }

      .card {
        max-width: 100%;
      }

      .rwd-toggle {
        display: block;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>狂熱雞尾酒與加密貨幣</h1>
    <div>
      <h2>目前天氣</h2>
      <div id="weather-result"></div>
    </div>
    <div>
      <h2>熱門加密貨幣</h2>
      <div id="trending-coins" class="row"></div>
      <input type="text" id="coin-search" placeholder="搜尋加密貨幣">
    </div>
    <div>
      <h2>隨機雞尾酒推薦</h2>
      <div id="trending-cocktails" class="row"></div>
      <input type="text" id="cocktail-search" placeholder="搜尋雞尾酒">
      <button id="random-cocktail">生成隨機雞尾酒</button>
    </div>
  </div>

  <script>
    const weatherResult = document.getElementById('weather-result');
    const trendingCoins = document.getElementById('trending-coins');
    const trendingCocktails = document.getElementById('trending-cocktails');
    const coinSearch = document.getElementById('coin-search');
    const cocktailSearch = document.getElementById('cocktail-search');
    const randomCocktailButton = document.getElementById('random-cocktail');

    const updateWeather = () => {
      navigator.geolocation.getCurrentPosition(
        (position) => {
          const { latitude, longitude } = position.coords;
          fetch(`https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current_weather=true`)
            .then((response) => response.json())
            .then((data) => {
              const { current_weather } = data;
              weatherResult.innerHTML = `
                <p>溫度：${current_weather.temperature}°C</p>
                <p>風速：${current_weather.windspeed} 公里/小時</p>
              `;
            });
        },
        (error) => {
          weatherResult.innerHTML = `<p>無法獲取地理位置。</p>`;
        }
      );
    };

    const updateTrendingCoins = () => {
      fetch('https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=10&page=1')
        .then((response) => response.json())
        .then((coins) => {
          trendingCoins.innerHTML = coins
            .map(
              (coin) => `
                <div class="card">
                  <img src="${coin.image}" alt="${coin.name}">
                  <h4>${coin.name}</h4>
                  <p>價格：$${coin.current_price}</p>
                </div>
              `
            )
            .join('');
        });
    };

    const updateTrendingCocktails = () => {
      trendingCocktails.innerHTML = '';
      const promises = Array.from({ length: 10 }, () =>
        fetch('https://www.thecocktaildb.com/api/json/v1/1/random.php').then((response) => response.json())
      );

      Promise.all(promises).then((results) => {
        results.forEach((result) => {
          const cocktail = result.drinks[0];
          trendingCocktails.innerHTML += `
            <div class="card">
              <img src="${cocktail.strDrinkThumb}" alt="${cocktail.strDrink}">
              <h4>${cocktail.strDrink}</h4>
              <p>${cocktail.strAlcoholic}</p>
            </div>
          `;
        });
      });
    };

    coinSearch.addEventListener('input', () => {
      const query = coinSearch.value.toLowerCase();
      fetch(`https://api.coingecko.com/api/v3/search?query=${query}`)
        .then((response) => response.json())
        .then((data) => {
          trendingCoins.innerHTML = data.coins
            .map(
              (coin) => `
                <div class="card">
                  <img src="${coin.thumb}" alt="${coin.name}">
                  <h4>${coin.name}</h4>
                </div>
              `
            )
            .join('');
        });
    });

    cocktailSearch.addEventListener('input', () => {
      const query = cocktailSearch.value;
      fetch(`https://www.thecocktaildb.com/api/json/v1/1/search.php?s=${query}`)
        .then((response) => response.json())
        .then((data) => {
          trendingCocktails.innerHTML = data.drinks
            .map(
              (cocktail) => `
                <div class="card">
                  <img src="${cocktail.strDrinkThumb}" alt="${cocktail.strDrink}">
                  <h4>${cocktail.strDrink}</h4>
                  <p>${cocktail.strAlcoholic}</p>
                </div>
              `
            )
            .join('');
        });
    });

    randomCocktailButton.addEventListener('click', () => {
      updateTrendingCocktails();
    });

    // Initialize updates
    setInterval(updateWeather, 1000); // Weather updates every second
    setInterval(updateTrendingCoins, 1000); // Coins update every second
    updateTrendingCocktails(); // Initialize cocktails
  </script>
</body>
</html>
